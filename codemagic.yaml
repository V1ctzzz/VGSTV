workflows:
  ios_release:
    name: iOS Release
    max_build_duration: 60

    integrations:
      app_store_connect: Apple VGSTV

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vgstv.playerplayer

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
